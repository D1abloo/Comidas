services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    mem_limit: 256m
    environment:
      POSTGRES_USER: bocado
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bocado}
      POSTGRES_DB: bocado
    volumes:
      - bocado_pg:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bocado -d bocado"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    mem_limit: 384m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      DATABASE_URL: postgres://bocado:${POSTGRES_PASSWORD:-bocado}@postgres:5432/bocado
      SESSION_SECRET: ${SESSION_SECRET:-cambia-este-secreto-en-produccion}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:4321}
      ALLOW_ADMIN_REGISTRATION: ${ALLOW_ADMIN_REGISTRATION:-false}
      BIZUM_COMPANY_PHONE: ${BIZUM_COMPANY_PHONE:-+34600123456}
    ports:
      - "127.0.0.1:4321:4321"

volumes:
  bocado_pg:
